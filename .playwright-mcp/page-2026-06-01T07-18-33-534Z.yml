        - paragraph [ref=e71]: The facility uses a Sequential Batch Reactor (SBR) system with biological nutrient removal — the same nitrogen cycle found in healthy aquatic ecosystems. Wastewater passes through primary screening, biological treatment, secondary clarification, and UV disinfection before being released as clean recycled water. Solar-assisted operations reduce energy costs, and IoT sensors provide real-time remote monitoring of water quality parameters.
