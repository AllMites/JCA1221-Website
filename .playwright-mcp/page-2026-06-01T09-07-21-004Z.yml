      - generic [ref=e84]:
        - generic [ref=e85]:
          - paragraph [ref=e86]: A Letter from the Founder
          - img [ref=e87]
        - generic [ref=e92]:
          - generic [ref=e93]: “
          - paragraph [ref=e95]: "I spent the first part of my career in corporate law — structuring project finance, negotiating deals, working the long hours that come with complex transactions. I was precise, analytical, and good at what I did. But after a near-fatal car accident, I found myself asking a question I couldn't ignore: 'What was I really meant to do?' The answer came from an unexpected place — my aquarium hobby. The nitrogen cycle that keeps a tank alive is the same process that can clean entire watersheds. Nature already knows how to purify water. It just needs the right infrastructure and the right people to make it happen. That's why JCA 1221 exists. We build environmental infrastructure that mimics natural processes — no heavy chemicals, no energy-intensive brute force, just biology guided by engineering. We go where others won't: small island communities, remote barangays, places where the business case isn't obvious but the environmental need is desperate. Our motto is 'Serbisyo, Hindi Negosyo' — Service, Not Business. That doesn't mean we don't care about sustainability. It means we measure success not just in revenue, but in cubic meters of water cleaned, in bays restored, in communities that can finally see through their coastline. If you're a government official looking for a partner who won't cut corners, or an investor who wants returns with real environmental impact — we should talk."
          - paragraph [ref=e97]: Jehremiah C. Asis, Founder & CEO
      - generic [ref=e102]:
        - generic [ref=e104]:
          - img [ref=e106]
          - heading "Zero Corruption, Zero Shortcuts" [level=2] [ref=e109]
          - paragraph [ref=e110]: Integrity isn't a marketing angle — it's the foundation of every project we build. In an industry where corners are often cut, our refusal to compromise has become our strongest competitive advantage.
        - generic [ref=e111]:
          - generic [ref=e112]:
            - heading "Full transparency in procurement" [level=3] [ref=e113]
            - paragraph [ref=e114]: Every contract, every supplier, every cost is documented and auditable. Government partners and investors get complete visibility into where their money goes.
          - generic [ref=e115]:
            - heading "Community-first accountability" [level=3] [ref=e116]
            - paragraph [ref=e117]: We don't just report to government agencies. We answer to the communities whose water we clean, whose bays we restore, and whose trust we earn project by project.
          - generic [ref=e118]:
            - heading "No facilitation payments" [level=3] [ref=e119]
            - paragraph [ref=e120]: Zero-tolerance policy across all projects, vendors, and subcontractors. This isn't negotiable — it's the reason partners choose us for sensitive, high-stakes environmental work.
      - generic [ref=e125]:
        - generic [ref=e127]:
          - img [ref=e129]
          - heading "Waste Is a Resource, Not an Endpoint" [level=2] [ref=e134]
          - paragraph [ref=e135]: "Nature doesn't produce waste — everything cycles. Our treatment systems follow the same principle: wastewater becomes clean water, solid waste becomes energy, and what was once pollution becomes productive."
        - generic [ref=e136]:
          - generic [ref=e137]:
            - heading "Biological treatment mimics nature" [level=3] [ref=e138]
            - paragraph [ref=e139]: Our systems use the same nitrogen cycle found in healthy aquatic ecosystems. Microorganisms do the heavy lifting — no harsh chemicals, no energy-intensive brute force.
          - generic [ref=e140]:
            - heading "Recycled water returns to the ecosystem" [level=3] [ref=e141]
            - paragraph [ref=e142]: The Puerto Princesa facility releases 4,000 cubic meters of treated water daily back into the bay, diluting other outflows and restoring marine habitats that now host Ironman and dragon boat events.
          - generic [ref=e143]:
            - heading "Pyrolysis transforms solid waste into energy" [level=3] [ref=e144]
            - paragraph [ref=e145]: Our Siargao expansion converts municipal solid waste into biochar and syngas through thermal decomposition — turning a pollution crisis into a clean energy source.
      - generic [ref=e150]:
        - generic [ref=e152]:
          - img [ref=e154]
          - heading "Serbisyo, Hindi Negosyo" [level=2] [ref=e156]
          - paragraph [ref=e157]: Service, Not Business. We are profitable and financially sustainable — but profit is the engine, not the destination. Our pricing model ensures communities can afford clean water, because environmental protection can't depend on wealth.
        - generic [ref=e158]:
          - generic [ref=e159]:
            - heading "Affordable for communities" [level=3] [ref=e160]
            - paragraph [ref=e161]: Treatment fees structured so that even small municipalities and island communities can access world-class environmental infrastructure without crippling their budgets.
          - generic [ref=e162]:
            - heading "Public-private partnership expertise" [level=3] [ref=e163]
            - paragraph [ref=e164]: We navigate the legal, financial, and regulatory complexity of PPPs so that local governments get infrastructure that works — without the corruption risks that often plague large projects.
          - generic [ref=e165]:
            - heading "Knowledge transfer, not dependency" [level=3] [ref=e166]
            - paragraph [ref=e167]: Every facility includes a Learning Center component. We train local operators, share technical knowledge, and build capacity so communities own their environmental future.
      - generic [ref=e172]:
        - generic [ref=e174]:
          - img [ref=e176]
          - heading "Proven Results, Not Promises" [level=2] [ref=e182]
          - paragraph [ref=e183]: We don't ask for trust — we earn it with every project delivered. From the award-winning Puerto Princesa facility to our growing pipeline across the Philippines, our track record speaks louder than any pitch deck.
        - generic [ref=e184]:
          - generic [ref=e185]:
            - heading "2025 Asian Water Award" [level=3] [ref=e186]
            - paragraph [ref=e187]: Water Reclamation Project of the Year — recognized internationally for restoring coastal ecosystems through innovative, scalable treatment technology.
          - generic [ref=e188]:
            - heading "Puerto Princesa Bay rehabilitation" [level=3] [ref=e189]
            - paragraph [ref=e190]: The bay, once too polluted for recreation, now hosts international Ironman triathlons and dragon boat races. Water quality is monitored, verified, and publicly transparent.
          - generic [ref=e191]:
