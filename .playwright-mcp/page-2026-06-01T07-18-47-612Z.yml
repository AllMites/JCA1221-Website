              - heading "Biological Nutrient Removal" [level=3] [ref=e230]
            - paragraph [ref=e231]: Our systems use naturally occurring bacteria to break down pollutants — the same nitrogen cycle that keeps rivers and aquariums healthy. No harsh chemicals. No toxic byproducts. Just biology, guided by engineering.
