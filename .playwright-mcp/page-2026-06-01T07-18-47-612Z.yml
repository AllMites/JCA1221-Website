              - heading "Modular, Phased Design" [level=3] [ref=e244]
            - paragraph [ref=e245]: Prefabricated treatment units allow rapid deployment in phases. Start with the capacity a community needs today, add modules as it grows — no expensive upfront overbuilding. Works on coastal terrain, hillsides, and small island footprints.
