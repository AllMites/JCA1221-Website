            - generic [ref=e43]:
              - heading "Collection & Screening" [level=3] [ref=e44]
              - paragraph [ref=e45]: Raw wastewater and septage arrive at the facility. Screens remove large solids — plastics, debris, grit — before treatment begins.
          - generic [ref=e46]:
            - generic [ref=e47]:
              - img [ref=e49]
              - generic [ref=e53]: "2"
            - generic [ref=e54]:
              - heading "Biological Treatment" [level=3] [ref=e55]
              - paragraph [ref=e56]: In the Sequential Batch Reactor, naturally occurring microorganisms consume organic pollutants. This is the same nitrogen cycle found in healthy rivers and aquariums — just optimized for scale.
          - generic [ref=e57]:
            - generic [ref=e58]:
              - img [ref=e60]
              - generic [ref=e62]: "3"
            - generic [ref=e63]:
              - heading "Clarification" [level=3] [ref=e64]
              - paragraph [ref=e65]: Treated water passes through settling tanks where remaining particles sink and are separated. Clear water rises to the top, ready for final polishing.
          - generic [ref=e66]:
            - generic [ref=e67]:
              - img [ref=e69]
              - generic [ref=e75]: "4"
            - generic [ref=e76]:
              - heading "UV Disinfection" [level=3] [ref=e77]
              - paragraph [ref=e78]: Water flows through ultraviolet light chambers that neutralize remaining pathogens. Solar panels help power this final sterilization step — no chemicals, no chlorine taste.
          - generic [ref=e79]:
            - generic [ref=e80]:
              - img [ref=e82]
              - generic [ref=e85]: "5"
            - generic [ref=e86]:
              - heading "Clean Water Release" [level=3] [ref=e87]
              - paragraph [ref=e88]: The recycled water is released back into the bay or river. It's clean enough for marine life to thrive — and at Puerto Princesa, it now hosts Ironman triathlons and dragon boat races.
