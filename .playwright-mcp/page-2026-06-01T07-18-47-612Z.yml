              - heading "Solar-Assisted & IoT Connected" [level=3] [ref=e257]
            - paragraph [ref=e258]: Solar panels reduce grid energy consumption. IoT sensors stream real-time water quality data to a cloud dashboard — partners and regulators can monitor performance from anywhere. Remote diagnostics catch issues before they become problems.
