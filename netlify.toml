[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["@sendgrid/mail", "@supabase/supabase-js"]

# ── Redirects ──────────────────────────────────────────────────────────

# www → non-www
[[redirects]]
  from = "https://www.jca1221.com/*"
  to = "https://jca1221.com/:splat"
  status = 301

# Netlify subdomain → custom domain
[[redirects]]
  from = "https://*.netlify.app/*"
  to = "https://jca1221.com/:splat"
  status = 301

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers are in public/_headers (Netlify reads this file automatically)
